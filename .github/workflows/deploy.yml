name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # DETERMINE ENVIRONMENT
  # ============================================================================
  setup:
    name: Setup Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # BUILD FOR DEPLOYMENT
  # ============================================================================
  build:
    name: Build for ${{ needs.setup.outputs.environment }}
    needs: setup
    if: needs.setup.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('digital-astrology/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci
        working-directory: ./digital-astrology

      - name: Generate Prisma Client
        run: npx prisma generate --schema=./prisma/schema.prisma
        working-directory: ./digital-astrology
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build
        working-directory: ./digital-astrology
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JYOTISH_API_URL: ${{ secrets.JYOTISH_API_URL }}
          JYOTISH_API_KEY: ${{ secrets.JYOTISH_API_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-build
          path: digital-astrology/.next
          retention-days: 7

  # ============================================================================
  # DEPLOY WEB APP (Vercel)
  # ============================================================================
  deploy-web:
    name: Deploy Web App
    needs: [setup]
    if: needs.setup.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ needs.setup.outputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./digital-astrology
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}             

      - name: Build Project Artifacts
        run: vercel build ${{ needs.setup.outputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./digital-astrology
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [[ "${{ needs.setup.outputs.environment }}" == "production" ]]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          fi
          echo "preview-url=$(cat deployment-url.txt)" >> $GITHUB_OUTPUT
        working-directory: ./digital-astrology
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployed to **${{ needs.setup.outputs.environment }}**: ${{ steps.deploy.outputs.preview-url }}'
            })

  # ============================================================================
  # DEPLOY ADMIN APP (Vercel)
  # ============================================================================
  deploy-admin:
    name: Deploy Admin App
    needs: [setup, build]
    if: false # Temporarily disabled
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          working-directory: ./apps/admin
          vercel-args: ${{ needs.setup.outputs.environment == 'production' && '--prod' || '' }}

  # ============================================================================
  # RUN DATABASE MIGRATIONS
  # ============================================================================
  migrate:
    name: Run Database Migrations
    needs: [setup]
    if: needs.setup.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: ./digital-astrology

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma
        working-directory: ./digital-astrology
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ============================================================================
  # DEPLOYMENT SUCCESS
  # ============================================================================
  deployment-complete:
    name: Deployment Complete
    needs: [setup, deploy-web, migrate]
    if: always() && needs.setup.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check deployment status
        run: |
          if [[ "${{ needs.deploy-web.result }}" != "success" || \
                "${{ needs.migrate.result }}" != "success" ]]; then
            echo "❌ Deployment failed"
            exit 1
          fi
          echo "✅ Deployment to ${{ needs.setup.outputs.environment }} successful"

      - name: Notify deployment success
        if: success()
        run: echo "🎉 Deployed to ${{ needs.setup.outputs.environment }}"
